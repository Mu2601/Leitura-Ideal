<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel da Bibliotecária - Leitura Ideal</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chama o script principal uma única vez -->
    <script src="java/script.js"></script>
    <style>
        .form-container { max-width: 500px; margin: 50px auto; padding: 20px; background: #0e1010; color: white; border-radius: 10px; }
        input, textarea, select { width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: none; display: block; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #12ffd8; color: black; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1d96f3; color: white; }
    </style>
</head>
<body>
    <nav>
        <ul class="ul">
            <a href="index.html"> <img src="imagem/icones/1.png" alt="home" class="ic"> </a>
            <a href="login.html"> <img src="imagem/icones/2.png" alt="login" class="ic"> </a>
            <a href="Bibliotecaria.html"> <img src="imagem/icones/3.png" alt="biblioteca" class="ic"> </a>
        </ul>
    </nav>

    <div class="form-container">
        <h2 style="font-family: 'Varela Round', sans-serif;">Adicionar um Livro</h2>
        
        <!-- Importante: Tag FORM para o reset funcionar -->
        <form id="form-livro">
            <input type="text" id="titulo" placeholder="Título do Livro" required>
            <input type="text" id="autor" placeholder="Autor" required>
            
            <select id="generol" required style="background: #222; color: white;">
                <option value="" disabled selected>Selecione o Gênero</option>
                <option value="Ficção">Ficção</option>
                <option value="Romance">Romance</option>
                <option value="Aventura">Aventura</option>
                <option value="Terror">Terror</option>
                <option value="Biografia">Biografia</option>
                <option value="Didático">Didático</option>
                <option value="Tragédia">Tragédia</option>
                <option value="Suspense/Policial">Suspense/Policial</option>
                <option value="Distopia">Distopia</option>
                <option value="Infantojuvenil">Infantojuvenil</option>
            </select>

            <input type="url" id="capa" placeholder="Link da Imagem da Capa (URL)" required>
            <textarea id="descricao" placeholder="Breve descrição do livro" rows="4"></textarea>
            <input type="number" id="quantidade" placeholder="Quantidade" min="1" value="1" required>
            
            <!-- type="button" evita que a página recarregue sozinha -->
            <button type="button" onclick="cadastrarLivro()">Adicionar ao Catálogo</button>
        </form>
        
        <br>
        <a href="index.html" style="color: #aaa; text-decoration: none;">← Voltar para a Biblioteca</a>
    </div>
</body>
</html>
